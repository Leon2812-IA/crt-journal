<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CRT JOURNAL</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CRT JOURNAL">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' rx='40' fill='%230a0a0d'/><text x='100' y='130' font-family='Arial' font-size='90' font-weight='bold' fill='%2300c2ff' text-anchor='middle'>CRT</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root { --bg: #0a0a0d; --sidebar: #07070a; --card: #121216; --card2: #18181e; --border: #222230; --text: #e0e0e8; --text2: #8888a0; --green: #2ecc71; --red: #e74c3c; --blue: #00c2ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
        /* PANTALLA DE LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%); }
        .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; max-width: 400px; width: 90%; }
        .login-box .logo { font-size: 2rem; font-weight: 700; color: #00c2ff; margin-bottom: 10px; }
        .login-box input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; }
        .login-box .btn { width: 100%; padding: 14px; background: #00c2ff; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
        .login-box .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .login-box .link { color: #00c2ff; cursor: pointer; font-size: 0.85rem; }
        .msg { font-size: 0.8rem; margin-top: 10px; min-height: 20px; }
        .msg.error { color: #e74c3c; } .msg.success { color: #2ecc71; }
        /* DASHBOARD */
        #app-container { display: none; }
        #app-container.active { display: flex; }
        .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; padding: 20px 0; z-index: 100; }
        .sidebar-header { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .sidebar-header .logo { font-size: 1.3rem; font-weight: 700; color: #00c2ff; }
        .sidebar-header .user { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 10px 0; }
        .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 11px 20px; color: var(--text2); text-decoration: none; font-size: 0.88rem; transition: 0.2s; cursor: pointer; }
        .sidebar-nav a:hover, .sidebar-nav a.active { background: var(--card); color: #fff; }
        .sidebar-footer { padding: 15px 20px; border-top: 1px solid var(--border); }
        .sidebar-footer select { width: 100%; padding: 10px; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 0.85rem; }
        .main { margin-left: 220px; flex: 1; padding: 20px 24px; }
        .page { display: none; } .page.active { display: block; }
        h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 16px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
        .stat-card .lbl { font-size: 0.73rem; color: var(--text2); text-transform: uppercase; }
        .stat-card .val { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
        .val.green { color: var(--green); } .val.red { color: var(--red); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
        .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text2); font-size: 0.7rem; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .green { color: var(--green); } .red { color: var(--red); }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 0.82rem; cursor: pointer; font-weight: 600; }
        .btn-blue { background: #00c2ff; color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
        .badge-green { background: rgba(46,204,113,0.15); color: var(--green); }
        .badge-red { background: rgba(231,76,60,0.15); color: var(--red); }
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
        .cal-day { padding: 6px; text-align: center; border-radius: 5px; cursor: pointer; min-height: 55px; background: var(--card2); font-size: 0.8rem; }
        .cal-day:hover { background: #222230; }
        .cal-day.head { background: transparent; cursor: default; font-weight: 600; font-size: 0.7rem; color: var(--text2); min-height: auto; }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day.today { border: 2px solid #00c2ff; }
        .cal-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .cal-nav button { background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: var(--text2); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: var(--card2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.85rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .toggle-group { display: flex; gap: 4px; }
        .toggle-btn { padding: 7px 14px; border: 1px solid var(--border); background: var(--card2); color: var(--text2); border-radius: 5px; cursor: pointer; font-size: 0.78rem; }
        .toggle-btn.active { background: #00c2ff; color: #000; }
        .hidden { display: none !important; }
    </style>
</head>
